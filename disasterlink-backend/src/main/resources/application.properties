# ===== Application =====
spring.application.name=disasterlink-backend
server.port=8080

# ===== MySQL Database =====
# Update the URL, username, and password to match your local MySQL setup.
spring.datasource.url=jdbc:mysql://localhost:3306/disasterlink_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=123456
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# ===== JPA / Hibernate =====
# "update" automatically creates/updates tables based on the entities.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# ===== JWT =====
# In a real project this secret should come from an environment variable, not be hard-coded.
jwt.secret=ThisIsADisasterLinkMiniProjectSecretKeyForJwtSigning123456
jwt.expiration-ms=86400000

# ===== Logging =====
logging.level.org.springframework.web=INFO
logging.level.com.disasterlink=DEBUG
