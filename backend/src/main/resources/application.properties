# ===========================
# DisasterLink Application Config
# ===========================

spring.application.name=disasterlink

# Server
server.port=8080

# ===========================
# MySQL Database
# ===========================
spring.datasource.url=jdbc:mysql://localhost:3306/disasterlink_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=your_mysql_password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect
spring.jpa.properties.hibernate.format_sql=true

# ===========================
# Redis (Pub/Sub - Kafka-interface layer)
# NOTE: Designed as Kafka-compatible. Redis Pub/Sub used for prototype.
# In production: replace RedisMessageBroker with KafkaMessageBroker
# (same interface contract: publish(topic, payload), subscribe(topic, handler))
# ===========================
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.password=
spring.data.redis.timeout=2000

# ===========================
# JWT Authentication
# ===========================
app.jwt.secret=disasterlink_super_secret_jwt_key_change_in_production_min_256_bits
app.jwt.expiration=86400000

# ===========================
# Gemini AI (Google)
# ===========================
app.gemini.api.key=YOUR_GEMINI_API_KEY
app.gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent

# ===========================
# Twilio SMS
# ===========================
app.twilio.account.sid=YOUR_TWILIO_ACCOUNT_SID
app.twilio.auth.token=YOUR_TWILIO_AUTH_TOKEN
app.twilio.phone.number=+1XXXXXXXXXX
app.twilio.sos.inbound.number=+1XXXXXXXXXX

# ===========================
# CORS
# ===========================
app.cors.allowed-origins=http://localhost:3000

# ===========================
# WebSocket
# ===========================
app.websocket.endpoint=/ws
app.websocket.topic.sos=/topic/sos
app.websocket.topic.assignments=/topic/assignments
app.websocket.topic.zones=/topic/zones
