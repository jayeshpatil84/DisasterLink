version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: disasterlink-mysql
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: disasterlink_db
      MYSQL_USER: dluser
      MYSQL_PASSWORD: dlpassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: disasterlink-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: disasterlink-backend
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/disasterlink_db?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: dluser
      SPRING_DATASOURCE_PASSWORD: dlpassword
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      APP_GEMINI_API_KEY: ${GEMINI_API_KEY}
      APP_TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID}
      APP_TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN}
      APP_TWILIO_PHONE_NUMBER: ${TWILIO_PHONE_NUMBER}
      APP_CORS_ALLOWED_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: disasterlink-frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:8080
    ports:
      - "3000:3000"

volumes:
  mysql_data:
  redis_data:
